<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Vencimentos</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div id="app">

        <header class="main-header">
            <nav class="nav-links">
                <a href="#" class="active">DashBoard</a>
                <a href="#">Adicionar</a>
                <a href="#">Relatório</a>
            </nav>
            <div class="category-selector">
                <span>Alimentícios ^</span>
            </div>
        </header>

        <main id="tela-home">

            <section class="dashboard-cards">
                <div class="card card-longe">Longe:<br><span id="count-longe" class="card-count">0</span></div>
                <div class="card card-organizar">Organizar:<br><span id="count-organizar" class="card-count">0</span>
                </div>
                <div class="card card-avencer">A vencer:<br><span id="count-avencer" class="card-count">0</span></div>
                <div class="card card-emrisco">Em risco:<br><span id="count-emrisco" class="card-count">0</span></div>
                <div class="card card-vencidos">Vencidos:<br><span id="count-vencidos" class="card-count">0</span></div>
            </section>

            <section class="products-list">
                <table class="product-table">
                    <thead>
                        <tr>
                            <th>Setor</th>
                            <th>Descrição</th>
                            <th>Qtd</th>
                            <th>Validade</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="product-tbody">
                    </tbody>
                </table>
            </section>
        </main>

        <main id="tela-adicionar" style="display: none;">
            <div class="card-evolutivo form-container">
                <h2 id="titulo-form">Cadastrar Novo Produto</h2>

                <form id="form-produto">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Código de Barras</label>
                            <input type="text" id="ipt-codigo" placeholder="0000000000000">
                        </div>
                        <div class="form-group">
                            <label>Nome do Produto</label>
                            <input type="text" id="ipt-nome" placeholder="Ex: Refrigerante Coca Cola Original 2L">
                        </div>
                        <div class="form-group">
                            <label>Setor</label>
                            <input type="text" id="ipt-setor" placeholder="Ex: 1">
                        </div>
                        <div class="form-group">
                            <label>Fornecedor</label>
                            <input type="text" id="ipt-fornecedor" placeholder="Ex: M. Dias Branco">
                        </div>

                        <div class="form-group">
                            <label>Validade</label>
                            <input type="date" id="ipt-validade">
                        </div>
                        <div class="form-group">
                            <label>Quantidade em Estoque</label>
                            <input type="number" id="ipt-qtd" placeholder="0">
                        </div>
                        <div class="form-group">
                            <label>Próximo Lote</label>
                            <input type="date" id="ipt-lote">
                        </div>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn-save">Salvar Produto</button>
                        <button type="button" class="btn-cancel" id="btn-cancelar">Cancelar</button>
                    </div>
                </form>
            </div>
        </main>
    </div>


    <div id="modal-container" class="modal-container">
        <div class="modal-content">

            <header class="modal-header">
                <h2 id="modal-product-name">Detalhes do Produto</h2>
                <button id="modal-close" class="modal-close-btn">&times;</button>
            </header>

            <div class="modal-image-container">
                <img id="modal-product-image" src="" alt="Imagem do Produto" class="product-image-placeholder">
            </div>

            <div class="modal-body">
                <div class="info-grid">
                    <div class="info-item">
                        <span><b>CÓDIGO:</b></span>
                        <span id="modal-product-code">---</span>
                    </div>
                    <div class="info-item">
                        <span><b>SETOR:</b></span>
                        <span id="modal-product-setor">---</span>
                    </div>
                    <div class="info-item">
                        <span><b>FORNECEDOR:</b></span>
                        <span id="modal-product-fornecedor">---</span>
                    </div>
                    <div class="info-item">
                        <span><b>PRÓX. LOTE:</b></span>
                        <span id="modal-product-lote">---</span>
                    </div>
                </div>

                <div class="modal-actions">
                    <button id="btn-editar-produto" class="btn-action btn-edit">Editar Produto</button>
                    <button id="btn-excluir-produto" class="btn-action btn-delete">Excluir Produto</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./src/main.ts"></script>
</body>

</html>
